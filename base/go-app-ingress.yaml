apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-app-dev-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: go.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: go-app-service
            port:
              number: 80
